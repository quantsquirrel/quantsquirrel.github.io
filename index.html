<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thesqrldev</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            text-align: center;
            padding: 3rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #8b949e;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .links a {
            color: #58a6ff;
            text-decoration: none;
            margin: 0 1rem;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .links a:hover { color: #bc8cff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>thesqrldev</h1>
        <p>builder & knowledge engineer</p>
        <div class="links">
            <a href="https://github.com/quantsquirrel">GitHub</a>
        </div>
    </div>
</body>
</html>
